<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gesture 3D Viewer</title>

<style>
body{
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}

video{
    width:500px;
    max-width:90%;
    border:3px solid white;
    border-radius:10px;
}

#status{
    font-size:35px;
    color:cyan;
    margin-top:20px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

</head>

<body>

<h1>Gesture 3D Viewer</h1>

<video id="video" autoplay playsinline muted></video>

<div id="status">손 인식 시작 중...</div>

<script>

const video =
document.getElementById("video");

const statusText =
document.getElementById("status");

function detectGesture(lm){

    let fingers=[];

    fingers.push(
        lm[4].x < lm[3].x ? 1 : 0
    );

    fingers.push(
        lm[8].y < lm[6].y ? 1 : 0
    );

    fingers.push(
        lm[12].y < lm[10].y ? 1 : 0
    );

    fingers.push(
        lm[16].y < lm[14].y ? 1 : 0
    );

    fingers.push(
        lm[20].y < lm[18].y ? 1 : 0
    );

    if(JSON.stringify(fingers)==="[0,0,0,0,0]")
        return "✊ FIST";

    if(JSON.stringify(fingers)==="[0,1,1,0,0]")
        return "✌️ V SIGN";

    if(JSON.stringify(fingers)==="[1,1,1,1,1]")
        return "🖐 OPEN HAND";

    return "👋 MOVE";
}

const hands = new Hands({
    locateFile: (file) =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands:1,
    minDetectionConfidence:0.7,
    minTrackingConfidence:0.7
});

hands.onResults((results)=>{

    if(results.multiHandLandmarks &&
       results.multiHandLandmarks.length > 0){

        const lm =
        results.multiHandLandmarks[0];

        statusText.innerHTML =
        detectGesture(lm);

    }else{

        statusText.innerHTML =
        "손을 화면에 보여주세요";
    }
});

navigator.mediaDevices.getUserMedia({
    video:true
})
.then(stream=>{

    video.srcObject = stream;

    const camera = new Camera(video,{

        onFrame: async ()=>{

            await hands.send({
                image:video
            });

        },

        width:640,
        height:480
    });

    camera.start();
});

</script>

</body>
</html>
