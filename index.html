<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>STL Hand Control FIX</title>

  <style>
    body { margin:0; background:#111; color:white; text-align:center; }
    #container { width:100vw; height:80vh; }
    video {
      position:absolute;
      right:10px;
      top:60px;
      width:200px;
      border:2px solid white;
    }
  </style>

  <!-- THREE (확실 버전) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/examples/js/loaders/STLLoader.js"></script>

  <!-- MEDIAPIPE -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>

<body>

<h2>🖐 STL HAND CONTROL (FIX)</h2>

<input type="file" id="fileInput" accept=".stl" />

<video id="video" autoplay playsinline></video>

<div id="container"></div>

<script src="script.js"></script>

</body>
</html>
