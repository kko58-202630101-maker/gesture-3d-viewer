<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>STL Viewer STABLE</title>

<style>
body { margin:0; overflow:hidden; background:#111; color:white; }
#ui { position:fixed; top:10px; left:10px; z-index:10; }
canvas { display:block; }
</style>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/loaders/STLLoader.js"></script>

</head>

<body>

<div id="ui">
<input type="file" id="fileInput" accept=".stl">
</div>

<script>

let scene, camera, renderer, model;

init();

function init(){

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );

    camera.position.set(0, 0, 3);

    renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 조명
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(1,1,1);
    scene.add(light);

    scene.add(new THREE.AmbientLight(0x444444));

    animate();
}

function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}

// STL 업로드
document.getElementById("fileInput").addEventListener("change",(e)=>{

    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(event){

        const loader = new THREE.STLLoader();
        const geometry = loader.parse(event.target.result);

        if(model) scene.remove(model);

        geometry.center();

        const material = new THREE.MeshNormalMaterial();

        model = new THREE.Mesh(geometry, material);

        scene.add(model);

    };

    reader.readAsArrayBuffer(file);
});

// resize 대응
window.addEventListener("resize", ()=>{

    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();

    renderer.setSize(window.innerWidth, window.innerHeight);

});

</script>

</body>
</html>
